<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="chartGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="60%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#86efac"/>
    </linearGradient>
    <linearGradient id="candleGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="candleRed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="penGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1e1b4b" flood-opacity="0.35"/>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feFlood flood-color="#a5b4fc" flood-opacity="0.4"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="80" ry="80" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Subtle grid lines -->
  <g stroke="#6366f1" stroke-width="0.8" opacity="0.25">
    <line x1="100" y1="140" x2="100" y2="380"/>
    <line x1="172" y1="140" x2="172" y2="380"/>
    <line x1="244" y1="140" x2="244" y2="380"/>
    <line x1="316" y1="140" x2="316" y2="380"/>
    <line x1="388" y1="140" x2="388" y2="380"/>
    <line x1="100" y1="188" x2="412" y2="188"/>
    <line x1="100" y1="236" x2="412" y2="236"/>
    <line x1="100" y1="284" x2="412" y2="284"/>
    <line x1="100" y1="332" x2="412" y2="332"/>
  </g>

  <!-- Candlesticks -->
  <g>
    <!-- Candle 1 - red -->
    <line x1="136" y1="195" x2="136" y2="310" stroke="url(#candleRed)" stroke-width="2.5"/>
    <rect x="124" y="220" width="24" height="55" rx="3" fill="url(#candleRed)"/>

    <!-- Candle 2 - green -->
    <line x1="196" y1="230" x2="196" y2="340" stroke="url(#candleGreen)" stroke-width="2.5"/>
    <rect x="184" y="250" width="24" height="60" rx="3" fill="url(#candleGreen)"/>

    <!-- Candle 3 - red -->
    <line x1="256" y1="210" x2="256" y2="330" stroke="url(#candleRed)" stroke-width="2.5"/>
    <rect x="244" y="235" width="24" height="50" rx="3" fill="url(#candleRed)"/>

    <!-- Candle 4 - green (big) -->
    <line x1="316" y1="175" x2="316" y2="310" stroke="url(#candleGreen)" stroke-width="2.5"/>
    <rect x="304" y="195" width="24" height="80" rx="3" fill="url(#candleGreen)"/>

    <!-- Candle 5 - green -->
    <line x1="376" y1="155" x2="376" y2="260" stroke="url(#candleGreen)" stroke-width="2.5"/>
    <rect x="364" y="170" width="24" height="60" rx="3" fill="url(#candleGreen)"/>
  </g>

  <!-- Equity curve line -->
  <polyline
    points="110,300 150,275 196,310 240,285 280,260 316,195 360,175 400,160"
    fill="none"
    stroke="url(#chartGrad)"
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#innerGlow)"
  />

  <!-- Glow dot at the end of the line -->
  <circle cx="400" cy="160" r="7" fill="#4ade80" opacity="0.9"/>
  <circle cx="400" cy="160" r="12" fill="#4ade80" opacity="0.25"/>

  <!-- Journal pen icon (bottom-right) -->
  <g transform="translate(350, 340) rotate(-30)" opacity="0.9">
    <rect x="0" y="0" width="14" height="60" rx="3" fill="url(#penGrad)"/>
    <polygon points="3,60 11,60 7,74" fill="#e0e7ff"/>
    <rect x="0" y="0" width="14" height="10" rx="3" fill="#a5b4fc"/>
  </g>

  <!-- "TJ" text mark -->
  <text x="256" y="438" text-anchor="middle" font-family="'Inter','SF Pro Display','Helvetica Neue',sans-serif" font-size="52" font-weight="800" fill="white" letter-spacing="6" opacity="0.95">TJ</text>

  <!-- Subtle tagline -->
  <text x="256" y="462" text-anchor="middle" font-family="'Inter','SF Pro Display','Helvetica Neue',sans-serif" font-size="14" font-weight="500" fill="#c7d2fe" letter-spacing="3" opacity="0.7">TRADING JOURNAL</text>
</svg>
